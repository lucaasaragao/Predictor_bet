name: Update predictions.json

on:
  schedule:
    # Roda a cada 8 horas (3 vezes ao dia)
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate predictions.json
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python predictor.py

      - name: Commit and push if changed
        run: |
          # Extract jogos from previous version (ignoring generated_at timestamp)
          if git show HEAD:predictions.json > /tmp/predictions_old.json 2>/dev/null; then
            OLD_JOGOS=$(jq -c '.jogos' /tmp/predictions_old.json 2>/dev/null || echo "null")
          else
            OLD_JOGOS="null"
          fi

          # Extract jogos from newly generated version
          NEW_JOGOS=$(jq -c '.jogos' predictions.json 2>/dev/null || echo "null")

          # Only commit if the actual game data changed (ignore timestamp differences)
          if [ "$OLD_JOGOS" = "$NEW_JOGOS" ]; then
            echo "No changes in jogos data (only timestamp changed)"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions.json
          git commit -m "chore: update predictions.json"
          git pull --rebase origin main
          git push origin main
